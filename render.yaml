services:
  - type: web
    name: ssr-attendence-whatsapp
    env: node
    plan: free
    buildCommand: rm -rf /opt/render/.cache/puppeteer /opt/render/project/.cache/puppeteer && npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: WHATSAPP_TRANSPORT
        value: webjs
      - key: TARGET_GROUP_NAME
        value: SSR attendence Group
      - key: WWEBJS_AUTH_DIR
        value: .wwebjs_auth
      - key: WHATSAPP_AUTO_START
        value: false
      - key: WHATSAPP_IDLE_SHUTDOWN_MS
        value: 600000
      - key: NODE_OPTIONS
        value: --max-old-space-size=128
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/.cache/puppeteer
      - key: WHATSAPP_GROUP_ID
        sync: false
